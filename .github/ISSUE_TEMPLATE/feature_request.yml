name: Feature Request
description: Suggest a new feature or improvement for the CTG PDX integration
title: '[Feature]: '
labels: ['enhancement', 'triage']
assignees:
  - FaserF
body:
  - type: markdown
    attributes:
      value: |
        ## Before You Submit
        - 🔍 Search [existing feature requests](https://github.com/FaserF/ha-ctgpdx/issues?q=is%3Aissue+label%3Aenhancement) to avoid duplicates.
        - 📖 Check the [documentation](https://github.com/FaserF/ha-ctgpdx/blob/master/README.md).

  - type: textarea
    id: problem_description
    attributes:
      label: Problem Description
      description: Is your feature request related to a problem? Please describe it clearly.
      placeholder: e.g. I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution_description
    attributes:
      label: Proposed Solution
      description: Describe the solution or feature you would like to see.
      placeholder: e.g. It would be great if...
    validations:
      required: true

  - type: dropdown
    id: feature_area
    attributes:
      label: Feature Area
      description: Which area of the integration does this feature relate to?
      options:
        - Occupancy / capacity data
        - Gym location support
        - Opening hours
        - Historical data / statistics
        - Sensor / entity improvements
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you have considered.
      placeholder: e.g. I also considered...
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or references about the feature request.
    validations:
      required: false
